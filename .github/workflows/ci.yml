name: CI

on:
  pull_request:
  push:
    branches:
      - main

env:
  JAVA_VERSION: "25"
  NODE_VERSION: "24"
  GOLANGCI_LINT_VERSION: "v2.12.1"
  GOTESTSUM_VERSION: "1.13.0"
  SQLC_VERSION: "1.31.1"
  MOON_VERSION: "2.2.3"

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      base_sha: ${{ steps.refs.outputs.base_sha }}
      current_sha: ${{ steps.refs.outputs.current_sha }}
      affected_projects: ${{ steps.affected.outputs.projects }}
      has_go_projects: ${{ steps.affected.outputs.has_go_projects }}
      has_java_projects: ${{ steps.affected.outputs.has_java_projects }}
      has_web_projects: ${{ steps.affected.outputs.has_web_projects }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up moon
        uses: moonrepo/setup-toolchain@v0
        with:
          moon-version: ${{ env.MOON_VERSION }}

      - name: Resolve comparison refs
        id: refs
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            CURRENT_SHA="${{ github.event.pull_request.head.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
            CURRENT_SHA="${{ github.sha }}"
          fi

          if [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
            BASE_SHA="origin/main"
          fi

          echo "Comparing $BASE_SHA to $CURRENT_SHA"
          echo "base_sha=$BASE_SHA" >> "$GITHUB_OUTPUT"
          echo "current_sha=$CURRENT_SHA" >> "$GITHUB_OUTPUT"

      - name: Detect affected projects
        id: affected
        run: |
          set -euo pipefail
          BASE_SHA='${{ steps.refs.outputs.base_sha }}'
          CURRENT_SHA='${{ steps.refs.outputs.current_sha }}'

          AFFECTED=$(
            moon query projects \
              --affected \
              --downstream deep \
              --base "$BASE_SHA" \
              --head "$CURRENT_SHA"
          )

          AFFECTED_JSON=$(echo "$AFFECTED" | jq -ce '.projects | map(.id)')
          HAS_GO=$(echo "$AFFECTED" | jq -r 'any(.projects[]?; (.config.tags // [] | index("language-go")) != null)')
          HAS_JAVA=$(echo "$AFFECTED" | jq -r 'any(.projects[]?; (.config.tags // [] | index("language-java")) != null)')
          HAS_WEB=$(echo "$AFFECTED" | jq -r 'any(.projects[]?; (.config.tags // [] | index("language-typescript")) != null)')

          printf 'projects=%s\n' "$AFFECTED_JSON" >> "$GITHUB_OUTPUT"
          printf 'has_go_projects=%s\n' "$HAS_GO" >> "$GITHUB_OUTPUT"
          printf 'has_java_projects=%s\n' "$HAS_JAVA" >> "$GITHUB_OUTPUT"
          printf 'has_web_projects=%s\n' "$HAS_WEB" >> "$GITHUB_OUTPUT"
          echo "Affected projects: $AFFECTED_JSON"

  go-ci:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.has_go_projects == 'true'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up moon
        uses: moonrepo/setup-toolchain@v0
        with:
          moon-version: ${{ env.MOON_VERSION }}

      - name: Restore Moon cache
        uses: actions/cache@v5
        with:
          path: |
            .moon/cache/hashes
            .moon/cache/outputs
          key: moon-cache-${{ runner.os }}-${{ github.ref_name }}-${{ github.job }}-${{ github.sha }}
          restore-keys: |
            moon-cache-${{ runner.os }}-${{ github.ref_name }}-${{ github.job }}-
            moon-cache-${{ runner.os }}-${{ github.job }}-

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          cache: true
          go-version-file: services/go/go.mod
          cache-dependency-path: services/go/go.sum

      - name: Install Go build tools
        run: |
          curl -sSfL https://golangci-lint.run/install.sh | sh -s -- -b "$(go env GOPATH)/bin" ${{ env.GOLANGCI_LINT_VERSION }}
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
          curl -sSfL "https://github.com/gotestyourself/gotestsum/releases/download/v${{ env.GOTESTSUM_VERSION }}/gotestsum_${{ env.GOTESTSUM_VERSION }}_linux_amd64.tar.gz" | tar -xz -C /tmp
          sudo mv /tmp/gotestsum /usr/local/bin/gotestsum
          chmod +x /usr/local/bin/gotestsum
          curl -sSfL "https://github.com/sqlc-dev/sqlc/releases/download/v${{ env.SQLC_VERSION }}/sqlc_${{ env.SQLC_VERSION }}_linux_amd64.tar.gz" | tar -xz -C /tmp
          sudo mv /tmp/sqlc /usr/local/bin/sqlc
          chmod +x /usr/local/bin/sqlc

      - name: Install Go dependencies
        run: moon run go-services:install-go --summary minimal

      - name: Query affected Go projects
        id: affected
        run: |
          set -euo pipefail
          PROJECTS=$(
            moon query projects \
              --affected \
              --downstream deep \
              --base='${{ needs.detect-changes.outputs.base_sha }}' \
              --head='${{ needs.detect-changes.outputs.current_sha }}' |
            jq -ce '.projects'
          )
          printf 'projects=%s\n' "$PROJECTS" >> "$GITHUB_OUTPUT"

      - name: Generate affected Go code
        run: |
          set -euo pipefail
          PROJECTS='${{ steps.affected.outputs.projects }}'
          mapfile -t TARGETS < <(echo "$PROJECTS" | jq -r '.[] | select(.tasks["generate-go"] != null) | "\(.id):generate-go"')
          if [ "${#TARGETS[@]}" -gt 0 ]; then
            moon run "${TARGETS[@]}" --summary minimal
          fi

      - name: Format Go code
        run: moon run go-services:format-go --summary minimal

      - name: Fail on generated or formatted Go changes
        run: |
          set -euo pipefail
          if ! git diff --quiet -- services/go; then
            echo "Generate or format steps produced uncommitted changes in services/go."
            git --no-pager diff -- services/go
            exit 1
          fi

      - name: Lint affected Go projects
        run: |
          set -euo pipefail
          PROJECTS='${{ steps.affected.outputs.projects }}'
          mapfile -t TARGETS < <(echo "$PROJECTS" | jq -r '.[] | select(.tasks["lint-go"] != null) | "\(.id):lint-go"')
          if [ "${#TARGETS[@]}" -gt 0 ]; then
            moon run --concurrency 1 "${TARGETS[@]}" --summary minimal
          fi

      - name: Build affected Go projects
        run: |
          set -euo pipefail
          PROJECTS='${{ steps.affected.outputs.projects }}'
          mapfile -t TARGETS < <(echo "$PROJECTS" | jq -r '.[] | select(.tasks["build-go"] != null) | "\(.id):build-go"')
          if [ "${#TARGETS[@]}" -gt 0 ]; then
            moon run "${TARGETS[@]}" --summary minimal
          fi

      - name: Test affected Go projects
        run: |
          set -euo pipefail
          PROJECTS='${{ steps.affected.outputs.projects }}'
          mapfile -t TARGETS < <(echo "$PROJECTS" | jq -r '.[] | select(.tasks["test-go"] != null) | "\(.id):test-go"')
          if [ "${#TARGETS[@]}" -gt 0 ]; then
            moon run "${TARGETS[@]}" --summary minimal
          fi

  java-ci:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.has_java_projects == 'true'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up moon
        uses: moonrepo/setup-toolchain@v0
        with:
          moon-version: ${{ env.MOON_VERSION }}

      - name: Restore Moon cache
        uses: actions/cache@v5
        with:
          path: |
            .moon/cache/hashes
            .moon/cache/outputs
          key: moon-cache-${{ runner.os }}-${{ github.ref_name }}-${{ github.job }}-${{ github.sha }}
          restore-keys: |
            moon-cache-${{ runner.os }}-${{ github.ref_name }}-${{ github.job }}-
            moon-cache-${{ runner.os }}-${{ github.job }}-

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: ${{ env.JAVA_VERSION }}
          cache: "maven"

      - name: Query affected Java projects
        id: affected
        run: |
          set -euo pipefail
          PROJECTS=$(
            moon query projects \
              --affected \
              --downstream deep \
              --base='${{ needs.detect-changes.outputs.base_sha }}' \
              --head='${{ needs.detect-changes.outputs.current_sha }}' |
            jq -ce '.projects'
          )
          printf 'projects=%s\n' "$PROJECTS" >> "$GITHUB_OUTPUT"

      - name: Install affected Java projects
        run: |
          set -euo pipefail
          PROJECTS='${{ steps.affected.outputs.projects }}'
          mapfile -t TARGETS < <(echo "$PROJECTS" | jq -r '.[] | select(.tasks["install-java"] != null) | "\(.id):install-java"')
          if [ "${#TARGETS[@]}" -gt 0 ]; then
            moon run "${TARGETS[@]}" --summary minimal
          fi

      - name: Format affected Java projects
        run: |
          set -euo pipefail
          PROJECTS='${{ steps.affected.outputs.projects }}'
          mapfile -t TARGETS < <(echo "$PROJECTS" | jq -r '.[] | select(.tasks["format-java"] != null) | "\(.id):format-java"')
          if [ "${#TARGETS[@]}" -gt 0 ]; then
            moon run "${TARGETS[@]}" --summary minimal
          fi

      - name: Fail on Java formatting changes
        run: |
          set -euo pipefail
          if ! git diff --quiet -- services/java; then
            echo "Formatting produced uncommitted changes in services/java."
            git --no-pager diff -- services/java
            exit 1
          fi

      - name: Lint affected Java projects
        run: |
          set -euo pipefail
          PROJECTS='${{ steps.affected.outputs.projects }}'
          mapfile -t TARGETS < <(echo "$PROJECTS" | jq -r '.[] | select(.tasks["lint-java"] != null) | "\(.id):lint-java"')
          if [ "${#TARGETS[@]}" -gt 0 ]; then
            moon run "${TARGETS[@]}" --summary minimal
          fi

      - name: Build affected Java projects
        run: |
          set -euo pipefail
          PROJECTS='${{ steps.affected.outputs.projects }}'
          mapfile -t TARGETS < <(echo "$PROJECTS" | jq -r '.[] | select(.tasks["build-java"] != null) | "\(.id):build-java"')
          if [ "${#TARGETS[@]}" -gt 0 ]; then
            moon run "${TARGETS[@]}" --summary minimal
          fi

      - name: Test affected Java projects
        run: |
          set -euo pipefail
          PROJECTS='${{ steps.affected.outputs.projects }}'
          mapfile -t TARGETS < <(echo "$PROJECTS" | jq -r '.[] | select(.tasks["test-java"] != null) | "\(.id):test-java"')
          if [ "${#TARGETS[@]}" -gt 0 ]; then
            moon run "${TARGETS[@]}" --summary minimal
          fi

  web-ci:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.has_web_projects == 'true'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up moon
        uses: moonrepo/setup-toolchain@v0
        with:
          moon-version: ${{ env.MOON_VERSION }}

      - name: Restore Moon cache
        uses: actions/cache@v5
        with:
          path: |
            .moon/cache/hashes
            .moon/cache/outputs
          key: moon-cache-${{ runner.os }}-${{ github.ref_name }}-${{ github.job }}-${{ github.sha }}
          restore-keys: |
            moon-cache-${{ runner.os }}-${{ github.ref_name }}-${{ github.job }}-
            moon-cache-${{ runner.os }}-${{ github.job }}-

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Query affected web projects
        id: affected
        run: |
          set -euo pipefail
          PROJECTS=$(
            moon query projects \
              --affected \
              --downstream deep \
              --base='${{ needs.detect-changes.outputs.base_sha }}' \
              --head='${{ needs.detect-changes.outputs.current_sha }}' |
            jq -ce '.projects'
          )
          printf 'projects=%s\n' "$PROJECTS" >> "$GITHUB_OUTPUT"

      - name: Install affected web projects
        run: |
          set -euo pipefail
          PROJECTS='${{ steps.affected.outputs.projects }}'
          mapfile -t TARGETS < <(echo "$PROJECTS" | jq -r '.[] | select(.tasks["install-web"] != null) | "\(.id):install-web"')
          if [ "${#TARGETS[@]}" -gt 0 ]; then
            moon run "${TARGETS[@]}" --summary minimal
          fi

      - name: Format affected web projects
        run: |
          set -euo pipefail
          PROJECTS='${{ steps.affected.outputs.projects }}'
          mapfile -t TARGETS < <(echo "$PROJECTS" | jq -r '.[] | select(.tasks["format-web"] != null) | "\(.id):format-web"')
          if [ "${#TARGETS[@]}" -gt 0 ]; then
            moon run "${TARGETS[@]}" --summary minimal
          fi

      - name: Fail on web formatting changes
        run: |
          set -euo pipefail
          if ! git diff --quiet -- frontend; then
            echo "Formatting produced uncommitted changes in frontend."
            git --no-pager diff -- frontend
            exit 1
          fi

      - name: Lint affected web projects
        run: |
          set -euo pipefail
          PROJECTS='${{ steps.affected.outputs.projects }}'
          mapfile -t TARGETS < <(echo "$PROJECTS" | jq -r '.[] | select(.tasks["lint-web"] != null) | "\(.id):lint-web"')
          if [ "${#TARGETS[@]}" -gt 0 ]; then
            moon run "${TARGETS[@]}" --summary minimal
          fi

      - name: Build affected web projects
        run: |
          set -euo pipefail
          PROJECTS='${{ steps.affected.outputs.projects }}'
          mapfile -t TARGETS < <(echo "$PROJECTS" | jq -r '.[] | select(.tasks["build-web"] != null) | "\(.id):build-web"')
          if [ "${#TARGETS[@]}" -gt 0 ]; then
            moon run "${TARGETS[@]}" --summary minimal
          fi

      - name: Test affected web projects
        run: |
          set -euo pipefail
          PROJECTS='${{ steps.affected.outputs.projects }}'
          mapfile -t TARGETS < <(echo "$PROJECTS" | jq -r '.[] | select(.tasks["test-web"] != null) | "\(.id):test-web"')
          if [ "${#TARGETS[@]}" -gt 0 ]; then
            moon run "${TARGETS[@]}" --summary minimal
          fi

  docker-build:
    runs-on: ubuntu-latest
    needs: [detect-changes, go-ci, java-ci, web-ci]
    if: |
      always() &&
      needs.detect-changes.result == 'success' &&
      needs.detect-changes.outputs.affected_projects != '[]' &&
      needs.go-ci.result != 'failure' &&
      needs.java-ci.result != 'failure' &&
      needs.web-ci.result != 'failure'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up moon
        uses: moonrepo/setup-toolchain@v0
        with:
          moon-version: ${{ env.MOON_VERSION }}

      - name: Restore Moon cache
        uses: actions/cache@v5
        with:
          path: |
            .moon/cache/hashes
            .moon/cache/outputs
          key: moon-cache-${{ runner.os }}-${{ github.ref_name }}-${{ github.job }}-${{ github.sha }}
          restore-keys: |
            moon-cache-${{ runner.os }}-${{ github.ref_name }}-${{ github.job }}-
            moon-cache-${{ runner.os }}-${{ github.job }}-

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Set GIT_SHA environment variable
        run: echo "GIT_SHA=${GITHUB_SHA::8}" >> "$GITHUB_ENV"

      - name: Query affected Docker projects
        id: affected
        run: |
          set -euo pipefail
          PROJECTS=$(
            moon query projects \
              --affected \
              --downstream deep \
              --base='${{ needs.detect-changes.outputs.base_sha }}' \
              --head='${{ needs.detect-changes.outputs.current_sha }}' |
            jq -ce '.projects'
          )
          printf 'projects=%s\n' "$PROJECTS" >> "$GITHUB_OUTPUT"

      - name: Build Docker images for affected projects
        run: |
          set -euo pipefail
          PROJECTS='${{ steps.affected.outputs.projects }}'
          mapfile -t TARGETS < <(echo "$PROJECTS" | jq -r '.[] | select(.tasks["docker"] != null) | "\(.id):docker"')
          if [ "${#TARGETS[@]}" -gt 0 ]; then
            moon run "${TARGETS[@]}" --summary minimal
          fi

      - name: Push Docker images (main branch only)
        if: github.ref == 'refs/heads/main'
        run: |
          set -euo pipefail
          PROJECTS='${{ steps.affected.outputs.projects }}'
          mapfile -t TARGETS < <(echo "$PROJECTS" | jq -r '.[] | select(.tasks["docker-push"] != null) | "\(.id):docker-push"')
          if [ "${#TARGETS[@]}" -gt 0 ]; then
            moon run "${TARGETS[@]}" --summary minimal
          fi

  summary:
    runs-on: ubuntu-latest
    needs: [detect-changes, go-ci, java-ci, web-ci, docker-build]
    if: always()
    steps:
      - name: Generate summary
        run: |
          AFFECTED='${{ needs.detect-changes.outputs.affected_projects }}'

          echo "## ✅ Moon CI Pipeline Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Affected Projects" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`json" >> "$GITHUB_STEP_SUMMARY"
          echo "$AFFECTED" | jq '.' >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          echo "### Job Results" >> "$GITHUB_STEP_SUMMARY"
          echo "- Go CI: ${{ needs.go-ci.result }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Java CI: ${{ needs.java-ci.result }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Web CI: ${{ needs.web-ci.result }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Docker: ${{ needs.docker-build.result }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          if [ "${{ needs.go-ci.result }}" != "failure" ] && [ "${{ needs.java-ci.result }}" != "failure" ] && [ "${{ needs.web-ci.result }}" != "failure" ] && [ "${{ needs.docker-build.result }}" != "failure" ]; then
            echo "### Results" >> "$GITHUB_STEP_SUMMARY"
            echo "✅ All affected language stages completed successfully" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "### Results" >> "$GITHUB_STEP_SUMMARY"
            echo "❌ Some stages failed - see job logs above" >> "$GITHUB_STEP_SUMMARY"
          fi
