name: CI

on:
  pull_request:
  push:
    branches:
      - main

env:
  GO_VERSION: "1.26"
  JAVA_VERSION: "21"
  NODE_VERSION: "24"
  GOLANGCI_LINT_VERSION: "v2.12.1"
  GOTESTSUM_VERSION: "1.13.0"
  NX_CACHE_DIRECTORY: .nx/cache

jobs:
  detect-and-test:
    runs-on: ubuntu-latest
    outputs:
      affected_projects: ${{ steps.affected.outputs.projects }}
      docker_projects: ${{ steps.filter-docker.outputs.docker_projects }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install Nx
        run: npm ci

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "21"
          cache: "maven"

      - name: Install build tools
        run: |
          curl -sSfL https://golangci-lint.run/install.sh | sh -s -- -b $(go env GOPATH)/bin ${{ env.GOLANGCI_LINT_VERSION }}
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH
          curl -sSfL https://github.com/gotestyourself/gotestsum/releases/download/v${{ env.GOTESTSUM_VERSION }}/gotestsum_${{ env.GOTESTSUM_VERSION }}_linux_amd64.tar.gz | tar -xz -C /tmp
          sudo mv /tmp/gotestsum /usr/local/bin/gotestsum
          chmod +x /usr/local/bin/gotestsum

      - name: Restore Nx cache
        uses: actions/cache@v3
        with:
          path: ${{ env.NX_CACHE_DIRECTORY }}
          key: nx-cache-${{ runner.os }}-${{ github.ref }}-${{ github.sha }}
          restore-keys: |
            nx-cache-${{ runner.os }}-${{ github.ref }}-
            nx-cache-${{ runner.os }}-

      - name: Detect affected projects
        id: affected
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            CURRENT_SHA="${{ github.event.pull_request.head.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
            CURRENT_SHA="${{ github.sha }}"
          fi
          
          echo "Comparing $BASE_SHA to $CURRENT_SHA"
          
          AFFECTED=$(npx nx show projects --affected --base=$BASE_SHA --head=$CURRENT_SHA --json 2>/dev/null || echo "[]")
          echo "projects=$(echo "$AFFECTED" | jq -c '.')" >> $GITHUB_OUTPUT
          echo "Affected projects: $AFFECTED"

      - name: Filter Docker-enabled projects
        id: filter-docker
        run: |
          AFFECTED='${{ steps.affected.outputs.projects }}'
          DOCKER_PROJECTS=$(echo "$AFFECTED" | jq -r '.[] | select(. == "go-backend" or . == "go-bff" or . == "java-services" or . == "frontend")' | tr '\n' ',' | sed 's/,$//')
          echo "docker_projects=$DOCKER_PROJECTS" >> $GITHUB_OUTPUT
          echo "Docker projects: $DOCKER_PROJECTS"

      - name: Lint affected projects
        run: |
          AFFECTED='${{ steps.affected.outputs.projects }}'
          PROJECTS=$(echo "$AFFECTED" | jq -r '.[]' | tr '\n' ',')
          
          if [ ! -z "$PROJECTS" ] && [ "$PROJECTS" != "" ]; then
            npx nx run-many --projects=$PROJECTS --target=lint --parallel=4 || exit 1
          fi

      - name: Build affected projects
        run: |
          AFFECTED='${{ steps.affected.outputs.projects }}'
          PROJECTS=$(echo "$AFFECTED" | jq -r '.[]' | tr '\n' ',')
          
          if [ ! -z "$PROJECTS" ] && [ "$PROJECTS" != "" ]; then
            npx nx run-many --projects=$PROJECTS --target=build --parallel=4 || exit 1
          fi

      - name: Test affected projects
        run: |
          AFFECTED='${{ steps.affected.outputs.projects }}'
          PROJECTS=$(echo "$AFFECTED" | jq -r '.[]' | tr '\n' ',')
          
          if [ ! -z "$PROJECTS" ] && [ "$PROJECTS" != "" ]; then
            npx nx run-many --projects=$PROJECTS --target=test --parallel=4 || exit 1
          fi

      - name: Save Nx cache
        if: always()
        uses: actions/cache/save@v3
        with:
          path: ${{ env.NX_CACHE_DIRECTORY }}
          key: nx-cache-${{ runner.os }}-${{ github.ref }}-${{ github.sha }}

  docker-build:
    runs-on: ubuntu-latest
    needs: detect-and-test
    if: needs.detect-and-test.outputs.docker_projects != ''
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set GIT_SHA environment variable
        run: echo "GIT_SHA=${GITHUB_SHA::8}" >> $GITHUB_ENV

      - name: Build Docker images for affected projects
        run: |
          DOCKER_PROJECTS='${{ needs.detect-and-test.outputs.docker_projects }}'
          IFS=',' read -ra PROJECTS <<< "$DOCKER_PROJECTS"
          
          for project in "${PROJECTS[@]}"; do
            echo "Building Docker image for: $project"
            docker build -f .docker/Dockerfile.go --build-arg SERVICE_NAME=${project#go-} -t ${project}:${{ env.GIT_SHA }} -t ${project}:latest . || \
            docker build -f .docker/Dockerfile.java --build-arg JAVA_MODULE=${project%-services} -t ${project}:${{ env.GIT_SHA }} -t ${project}:latest . || \
            docker build -f .docker/Dockerfile.frontend -t ${project}:${{ env.GIT_SHA }} -t ${project}:latest .
          done

      - name: Push Docker images (main branch only)
        if: github.ref == 'refs/heads/main'
        run: |
          echo "Docker push would go here (requires registry credentials)"
          echo "Projects to push: ${{ needs.detect-and-test.outputs.docker_projects }}"

  summary:
    runs-on: ubuntu-latest
    needs: [detect-and-test, docker-build]
    if: always()
    steps:
      - name: Generate summary
        run: |
          AFFECTED='${{ needs.detect-and-test.outputs.projects }}'
          DOCKER_PROJECTS='${{ needs.detect-and-test.outputs.docker_projects }}'
          
          echo "## ✅ Nx CI Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Affected Projects" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "$AFFECTED" | jq '.' >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ ! -z "$DOCKER_PROJECTS" ] && [ "$DOCKER_PROJECTS" != "" ]; then
            echo "### Docker Images Built" >> $GITHUB_STEP_SUMMARY
            echo "$DOCKER_PROJECTS" | tr ',' '\n' | sed 's/^/- /' >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ "${{ needs.detect-and-test.result }}" == "success" ]; then
            echo "### Results" >> $GITHUB_STEP_SUMMARY
            echo "✅ All affected projects: lint, build, test passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "### Results" >> $GITHUB_STEP_SUMMARY
            echo "❌ Some tests failed - see logs above" >> $GITHUB_STEP_SUMMARY
          fi
