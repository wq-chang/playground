name: CD (Deployment)

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches:
      - main

env:
  MOON_VERSION: "2.2.3"

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up moon
        uses: moonrepo/setup-toolchain@v0
        with:
          moon-version: ${{ env.MOON_VERSION }}

      - name: Detect affected projects
        id: affected
        run: |
          set -euo pipefail

          BASE_SHA="${{ github.event.workflow_run.head_commit.parent }}"
          CURRENT_SHA="${{ github.event.workflow_run.head_commit.id }}"

          if [ -z "$BASE_SHA" ]; then
            BASE_SHA="origin/main"
          fi

          AFFECTED=$(
            MOON_BASE="$BASE_SHA" \
            MOON_HEAD="$CURRENT_SHA" \
            moon query projects \
              --affected \
              --downstream deep \
              --tasks 'docker|docker-push' |
            jq -cr '.projects | map(.id)'
          )

          DEPLOYABLE=$(
            echo "$AFFECTED" |
            jq -r '.[] | select(. == "go-backend" or . == "go-bff" or . == "keycloak-custom-image" or . == "frontend")' |
            tr '\n' ',' |
            sed 's/,$//'
          )

          echo "projects=$AFFECTED" >> "$GITHUB_OUTPUT"
          echo "deployable=$DEPLOYABLE" >> "$GITHUB_OUTPUT"

      - name: Deploy affected projects
        if: steps.affected.outputs.deployable != ''
        run: |
          PROJECTS='${{ steps.affected.outputs.deployable }}'
          echo "Ready to deploy: $PROJECTS"

          # TODO: Add actual deployment logic here
          # Example:
          # - Pull Docker images
          # - Update Kubernetes manifests
          # - Apply changes
          # - Verify rollout

          echo "Note: Deployment implementation needed"

      - name: Post deployment summary
        run: |
          echo "## 🚀 Deployment Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "Deployable projects: ${{ steps.affected.outputs.deployable }}" >> "$GITHUB_STEP_SUMMARY"
