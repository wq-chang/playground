name: CD (Deployment)

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Install Nx
        run: npm ci

      - name: Detect affected projects
        id: affected
        run: |
          # Get commits from previous workflow run
          BASE_SHA="${{ github.event.workflow_run.head_commit.parent }}"
          CURRENT_SHA="${{ github.event.workflow_run.head_commit.id }}"
          
          AFFECTED=$(npx nx show projects --affected --base=$BASE_SHA --head=$CURRENT_SHA --json 2>/dev/null || echo "[]")
          echo "projects=$(echo "$AFFECTED" | jq -c '.')" >> $GITHUB_OUTPUT
          
          # Filter deployable projects
          DEPLOYABLE=$(echo "$AFFECTED" | jq -r '.[] | select(. == "go-backend" or . == "go-bff" or . == "keycloak-custom-image" or . == "frontend")' | tr '\n' ',' | sed 's/,$//')
          echo "deployable=$DEPLOYABLE" >> $GITHUB_OUTPUT

      - name: Deploy affected projects
        if: steps.affected.outputs.deployable != ''
        run: |
          PROJECTS='${{ steps.affected.outputs.deployable }}'
          echo "Ready to deploy: $PROJECTS"
          
          # TODO: Add actual deployment logic here
          # Example:
          # - Pull Docker images
          # - Update Kubernetes manifests
          # - Apply changes
          # - Verify rollout
          
          echo "Note: Deployment implementation needed"

      - name: Post deployment summary
        run: |
          echo "## 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "Deployable projects: ${{ steps.affected.outputs.deployable }}" >> $GITHUB_STEP_SUMMARY
