dependsOn:
  - 'keycloak-custom'
language: 'java'
layer: 'library'
stack: 'backend'
tags:
  - 'java'
  - 'keycloak'

tasks:
  install-java:
    command: 'mvn -B -ntp -N dependency:go-offline'
    options:
      cache: false
    toolchains: 'system'

  install:
    deps:
      - '~:install-java'

  format-java:
    command: 'mvn -B -ntp -N spotless:apply'
    options:
      cache: false
    toolchains: 'system'

  format:
    deps:
      - '~:format-java'

  build-java:
    command: 'mvn -B -ntp clean package -DskipTests'
    deps:
      - target: '^:build-java'
        optional: true
    options:
      cache: true
    toolchains: 'system'

  build:
    deps:
      - '~:build-java'

  test-java:
    command: 'mvn -B -ntp test'
    options:
      cache: true
    toolchains: 'system'

  test:
    deps:
      - '~:test-java'

  lint-java:
    command: 'mvn -B -ntp -N spotless:check'
    options:
      cache: true
    toolchains: 'system'

  lint:
    deps:
      - '~:lint-java'
