dependsOn:
  - 'go-services'
  - 'go-library'
language: 'go'
layer: 'application'
stack: 'backend'
tags:
  - 'go'

tasks:
  build-go:
    command: 'go build -v ./...'
    deps:
      - target: '^:build-go'
        optional: true
    options:
      cache: true
    toolchains: 'system'

  build:
    deps:
      - '~:build-go'

  test-go:
    command: 'gotestsum --format testname -- -v ./...'
    deps:
      - target: '^:build-go'
        optional: true
    options:
      cache: true
    toolchains: 'system'

  test:
    deps:
      - '~:test-go'

  format-go:
    command: 'golangci-lint fmt ./...'
    options:
      cache: false
    toolchains: 'system'

  format:
    deps:
      - '~:format-go'

  lint-go:
    command: 'golangci-lint run ./... --allow-parallel-runners'
    options:
      cache: true
    toolchains: 'system'

  lint:
    deps:
      - '~:lint-go'

  docker:
    script: 'docker build -f services/go/bff/Dockerfile -t go-bff:${GIT_SHA:-latest} -t go-bff:latest .'
    options:
      cache: false
      runFromWorkspaceRoot: true
    toolchains: 'system'

  docker-push:
    deps:
      - '~:docker'
    script: 'docker push go-bff:${GIT_SHA:-latest} && docker push go-bff:latest'
    options:
      cache: false
      runFromWorkspaceRoot: true
    toolchains: 'system'
