inheritedBy:
  files:
    - 'pom.xml'
  language: 'java'

tasks:
  format-java:
    command: 'mvn -B -ntp -N spotless:apply'
    options:
      cache: false
    toolchains: 'system'

  format:
    deps:
      - '~:format-java'
    options:
      cache: false

  lint-java:
    command: 'mvn -B -ntp -N spotless:check'
    options:
      cache: true
    toolchains: 'system'

  lint:
    deps:
      - '~:lint-java'
