inheritedBy:
  language: 'go'
  tags:
    not:
      - 'aggregator'

tasks:
  build-go:
    command: 'go build -v ./...'
    deps:
      - target: '^:build-go'
        optional: true
    options:
      cache: true
    toolchains: 'system'

  build:
    deps:
      - '~:build-go'

  test-go:
    command: 'gotestsum'
    args:
        - '--format'
        - 'testname'
        - '--'
        - '-tags=integration'
        - '-v'
        - './...'
    deps:
      - target: '^:build-go'
        optional: true
    options:
      cache: true
    toolchains: 'system'

  test:
    deps:
      - '~:test-go'

  generate-go:
    command: 'go generate ./...'
    options:
      cache: true
    toolchains: 'system'

  lint-go:
    command: 'golangci-lint run'
    args:
        - '--build-tags'
        - 'integration'
        - '--allow-parallel-runners'
        - './...'
    options:
      cache: true
    toolchains: 'system'

  lint:
    deps:
      - '~:lint-go'
